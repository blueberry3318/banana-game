<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>바나나를 피해라</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  color: #fff;
}
.header {
  display: flex;
  justify-content: space-between;
  width: 400px;
  max-width: 90vw;
  margin-bottom: 10px;
  font-size: 15px;
  color: #aaa;
}
.header strong { color: #ffd93d; }
canvas {
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  background: #1a1a2e;
  display: block;
  max-width: 90vw;
}
.footer {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  align-items: center;
}
button {
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 8px;
  padding: 8px 24px;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: rgba(255,255,255,0.15); }
.hint { font-size: 12px; color: #555; }
</style>
</head>
<body>
<div class="header">
  <span>점수: <strong id="score">0</strong></span>
  <span>최고: <strong id="best">0</strong></span>
</div>
<canvas id="gameCanvas" width="400" height="500"></canvas>
<div class="footer">
  <button id="startBtn" onclick="startGame()">시작</button>
  <span class="hint">← → 방향키 또는 터치로 이동</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let player, bananas, score, best, gameRunning, animId, lastTime, spawnTimer, spawnInterval, speed, scoreTimer;
best = 0;

function initGame() {
  player = { x: W/2, y: H - 60, w: 40, h: 40, speed: 6 };
  bananas = [];
  score = 0;
  spawnTimer = 0;
  spawnInterval = 1200;
  speed = 3;
  gameRunning = true;
  lastTime = null;
  scoreTimer = 0;
  keys = {};
}

let keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let touchX = null;
canvas.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (touchX === null) return;
  const dx = e.touches[0].clientX - touchX;
  player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x + dx));
  touchX = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { touchX = null; });

function spawnBanana() {
  bananas.push({
    x: Math.random() * (W - 40) + 20,
    y: -30,
    w: 24,
    h: 30,
    speed: speed + Math.random() * 2
  });
}

function drawPlayer(x, y, w, h) {
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x, y + h*0.4, w*0.3, h*0.4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffd93d';
  ctx.beginPath();
  ctx.arc(x, y + h*0.15, w*0.25, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ff6b6b';
  ctx.fillRect(x - w*0.15, y + h*0.1, w*0.3, h*0.05);
  ctx.restore();
}

function drawBanana(x, y, w, h) {
  ctx.save();
  ctx.translate(x, y + h/2);
  ctx.fillStyle = '#ffd93d';
  ctx.strokeStyle = '#e6a800';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-w/2, h/3);
  ctx.quadraticCurveTo(-w/2, -h/2, 0, -h/2);
  ctx.quadraticCurveTo(w/2, -h/2, w/2, 0);
  ctx.quadraticCurveTo(w/2, h/2, 0, h/3);
  ctx.quadraticCurveTo(-w/4, h/2, -w/2, h/3);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#b8860b';
  ctx.fillRect(-2, -h/2 - 4, 4, 6);
  ctx.restore();
}

function checkCollision(p, b) {
  return Math.abs(p.x - b.x) < (p.w/2 + b.w/2) - 8 &&
         Math.abs((p.y + p.h/2) - (b.y + b.h/2)) < (p.h/2 + b.h/2) - 8;
}

function gameLoop(ts) {
  if (!gameRunning) return;
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if (keys['ArrowLeft']) player.x = Math.max(player.w/2, player.x - player.speed);
  if (keys['ArrowRight']) player.x = Math.min(W - player.w/2, player.x + player.speed);

  scoreTimer += dt;
  if (scoreTimer >= 100) {
    score++;
    scoreTimer = 0;
    document.getElementById('score').textContent = score;
  }

  spawnTimer += dt;
  if (spawnTimer > spawnInterval) {
    spawnBanana();
    spawnTimer = 0;
    spawnInterval = Math.max(350, spawnInterval - 12);
    speed = Math.min(14, speed + 0.08);
  }

  bananas.forEach(b => { b.y += b.speed * (dt / 16); });
  bananas = bananas.filter(b => b.y < H + 40);

  for (let b of bananas) {
    if (checkCollision(player, b)) {
      gameRunning = false;
      if (score > best) best = score;
      document.getElementById('best').textContent = best;
      drawGameOver();
      return;
    }
  }

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  for (let i = 0; i < 40; i++) {
    ctx.fillRect((i * 137 + score * 2) % W, (i * 97 + score) % H, 1, 1);
  }

  bananas.forEach(b => drawBanana(b.x, b.y, b.w, b.h));
  drawPlayer(player.x, player.y, player.w, player.h);

  animId = requestAnimationFrame(gameLoop);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = '500 30px sans-serif';
  ctx.fillText('게임 오버', W/2, H/2 - 50);
  ctx.font = '400 20px sans-serif';
  ctx.fillStyle = '#ffd93d';
  ctx.fillText('점수: ' + score, W/2, H/2);
  if (score >= best && score > 0) {
    ctx.fillStyle = '#2ecc8f';
    ctx.font = '400 14px sans-serif';
    ctx.fillText('최고 기록!', W/2, H/2 + 30);
  }
  ctx.fillStyle = '#888';
  ctx.font = '400 13px sans-serif';
  ctx.fillText('시작 버튼을 눌러 다시 시작', W/2, H/2 + 60);
}

function drawStart() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd93d';
  ctx.font = '500 26px sans-serif';
  ctx.fillText('바나나를 피해라!', W/2, H/2 - 40);
  ctx.fillStyle = '#aaa';
  ctx.font = '400 14px sans-serif';
  ctx.fillText('← → 방향키 또는 터치로 이동', W/2, H/2 + 5);
  ctx.fillText('시간이 지날수록 빨라져요', W/2, H/2 + 30);
}

function startGame() {
  if (animId) cancelAnimationFrame(animId);
  initGame();
  animId = requestAnimationFrame(gameLoop);
}

drawStart();
</script>
</body>
</html>
